      BYZANTINE_QUORUM: 10
      K_VALUE_TARGET: 0.99
    volumes:
      - ./engines:/app
      - hash-ledger:/data/ledger:ro
      - engine-06-state:/data/state
      - engine-06-logs:/logs
    working_dir: /app
