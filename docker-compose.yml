version: '3.9'

services:
  # Engine 365-Days: Core validation engine (12M+ cycles)
  engine-365-days:
    image: python:3.11-slim
    container_name: engine-365-days
    environment:
      ENGINE_ID: "E01"
      ENGINE_NAME: "engine-365-days"
      CYCLES_TARGET: 12104208
      CONSENSUS_MODE: "CIRCLE_MONOTONIC_RANGE"
    volumes:
      - ./engines:/app
      - engine-365-logs:/logs
    working_dir: /app
    command: python3 engine_365_days.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    mem_limit: 512m
    cpus: '2'
    labels:
      role: "core-validator"

  # Ultimate Engine: Sovereign decision architecture (2.5M+ cycles)
  ultimate-engine:
    image: python:3.11-slim
    container_name: ultimate-engine
    environment:
      ENGINE_ID: "E02"
      ENGINE_NAME: "ultimate-engine"
      CYCLES_TARGET: 2548079
      BYZANTINE_LAYERS: 12
      SOVEREIGNTY_ORDERS: 10
    volumes:
      - ./engines:/app
      - ultimate-logs:/logs
    working_dir: /app
    command: python3 ultimate_engine.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/ultimate_sovereign_metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    mem_limit: 1g
    cpus: '2'
    labels:
      role: "sovereign-validator"

  # TENET Agency 101: Coordinator (641M+ ticks)
  tenetaiagency-101:
    image: python:3.11-slim
    container_name: tenetaiagency-101
    environment:
      ENGINE_ID: "E03"
      ENGINE_NAME: "tenetaiagency-101"
      TICKS_TARGET: 641642364
      HEARTBEAT_INTERVAL: 3600000
    volumes:
      - ./engines:/app
      - tenet-logs:/logs
    working_dir: /app
    command: python3 tenetaiagency_101.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    mem_limit: 512m
    cpus: '2'
    labels:
      role: "coordinator"

networks:
  tenet-network:
    driver: bridge
    name: tenet-network

volumes:
  engine-365-logs:
    driver: local
  ultimate-logs:
    driver: local
  tenet-logs:
    driver: local
