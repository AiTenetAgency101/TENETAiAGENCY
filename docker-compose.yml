      - witness-mesh
    mem_limit: 256m
    cpus: '1'
    labels:
      layer: "byzantine-consensus"
      role: "peer-validator"
      engine: "E14"

  # ============================================================================
  # GRID AGGREGATION & VERIFICATION LAYER
  # ============================================================================

  grid-aggregator:
    image: python:3.11-slim
    container_name: grid-aggregator
    environment:
      AGGREGATION_MODE: "witnessed-grid"
      GRID_RESOLUTION: "0.5-degree"
      K_VALUE_THRESHOLD: 0.99
    volumes:
      - ./aggregation:/app
      - hash-ledger:/data/ledger:ro
      - engine-365-state:/data/e01:ro
      - engine-777-state:/data/e02:ro
      - engine-101-state:/data/e03:ro
      - engine-04-state:/data/e04:ro
      - engine-05-state:/data/e05:ro
      - engine-06-state:/data/e06:ro
      - engine-07-state:/data/e07:ro
      - engine-08-state:/data/e08:ro
      - engine-09-state:/data/e09:ro
      - engine-10-state:/data/e10:ro
      - engine-11-state:/data/e11:ro
      - engine-12-state:/data/e12:ro
      - engine-13-state:/data/e13:ro
      - engine-14-state:/data/e14:ro
      - grid-cache:/data/grid
      - grid-logs:/logs
    working_dir: /app
    command: python grid_aggregator.py
    networks:
      - consensus-ring
      - witness-mesh
    depends_on:
      - engine-365
      - engine-777
      - engine-101
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/grid_status.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "aggregation"
      role: "grid-verification"

  # ============================================================================
  # PUBLIC DASHBOARD (robdoe.com)
  # ============================================================================

  public-dashboard:
    image: nginx:alpine
    container_name: public-dashboard
    ports:
      - "80:80"
    volumes:
      - ./dashboards/public:/usr/share/nginx/html:ro
      - ./nginx/public.conf:/etc/nginx/nginx.conf:ro
    networks:
      - witness-mesh
    depends_on:
      - grid-aggregator
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      domain: "robdoe.com"
      access: "public"
      content: "witnessed-atmospheric-grid"

  # ============================================================================
  # PRIVATE ADMIN DASHBOARD (robertdoe.pw)
  # ============================================================================

  private-dashboard:
    image: nginx:alpine
    container_name: private-dashboard
    ports:
      - "8443:443"
    volumes:
      - ./dashboards/private:/usr/share/nginx/html:ro
      - ./nginx/private.conf:/etc/nginx/nginx.conf:ro
    networks:
      - witness-mesh
    depends_on:
      - grid-aggregator
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      domain: "robertdoe.pw"
      access: "private"
      content: "ledger-forensics-witness-status"

  # ============================================================================
  # MONITORING & TELEMETRY
  # ============================================================================

  telemetry-collector:
    image: python:3.11-slim
    container_name: telemetry-collector
    environment:
      COLLECTION_MODE: "cycle-based"
      METRICS_INTERVAL: 100
    volumes:
      - ./telemetry:/app
      - engine-365-logs:/data/e01:ro
      - engine-777-logs:/data/e02:ro
      - engine-101-logs:/data/e03:ro
      - hash-logs:/data/hash:ro
      - witness-1-logs:/data/wit1:ro
      - witness-2-logs:/data/wit2:ro
      - witness-3-logs:/data/wit3:ro
      - telemetry-logs:/logs
    working_dir: /app
    command: python telemetry_service.py
    networks:
      - witness-mesh
      - consensus-ring
    labels:
      role: "observability"

networks:
  witness-mesh:
    driver: bridge
    name: xyo-witness-network
  consensus-ring:
    driver: bridge
    name: byzantine-consensus-network

volumes:
  # Satellite ingestion
  bom-tiles:
    driver: local
  himawari-tiles:
    driver: local
  goes-tiles:
    driver: local
  meteosat-tiles:
    driver: local

  # Hashing & ledger
  hash-ledger:
    driver: local
  hash-logs:
