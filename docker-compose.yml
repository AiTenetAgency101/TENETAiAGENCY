version: '3.9'

services:
  # ============================================================================
  # SATELLITE DATA INGESTION LAYER
  # ============================================================================
  
  satellite-bom:
    image: python:3.11-slim
    container_name: satellite-bom
    environment:
      SATELLITE_ID: "BOM"
      SATELLITE_REGION: "Australia"
      TILE_BANDS: "VIS,IR,WV"
      DECOMPOSITION_LEVEL: 5
    volumes:
      - ./ingestion/bom:/app
      - bom-tiles:/data/tiles
      - bom-logs:/logs
    working_dir: /app
    command: python decompose_and_hash.py
    networks:
      - witness-mesh
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/status.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "satellite-ingestion"
      role: "data-source"

  satellite-himawari:
    image: python:3.11-slim
    container_name: satellite-himawari
    environment:
      SATELLITE_ID: "Himawari-8"
      SATELLITE_REGION: "Pacific"
      TILE_BANDS: "VIS,IR,WV"
      DECOMPOSITION_LEVEL: 5
    volumes:
      - ./ingestion/himawari:/app
      - himawari-tiles:/data/tiles
      - himawari-logs:/logs
    working_dir: /app
    command: python decompose_and_hash.py
    networks:
      - witness-mesh
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/status.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "satellite-ingestion"
      role: "data-source"

  satellite-goes:
    image: python:3.11-slim
    container_name: satellite-goes
    environment:
      SATELLITE_ID: "GOES-16"
      SATELLITE_REGION: "Americas"
      TILE_BANDS: "VIS,IR,WV"
      DECOMPOSITION_LEVEL: 5
    volumes:
      - ./ingestion/goes:/app
      - goes-tiles:/data/tiles
      - goes-logs:/logs
    working_dir: /app
    command: python decompose_and_hash.py
    networks:
      - witness-mesh
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/status.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "satellite-ingestion"
      role: "data-source"

  satellite-meteosat:
    image: python:3.11-slim
    container_name: satellite-meteosat
    environment:
      SATELLITE_ID: "Meteosat-11"
      SATELLITE_REGION: "Europe_Africa"
      TILE_BANDS: "VIS,IR,WV"
      DECOMPOSITION_LEVEL: 5
    volumes:
      - ./ingestion/meteosat:/app
      - meteosat-tiles:/data/tiles
      - meteosat-logs:/logs
    working_dir: /app
    command: python decompose_and_hash.py
    networks:
      - witness-mesh
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/status.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "satellite-ingestion"
      role: "data-source"

  # ============================================================================
  # CRYPTOGRAPHIC HASHING LAYER
  # ============================================================================

  hash-engine:
    image: python:3.11-slim
    container_name: hash-engine
    environment:
      HASH_ALGORITHM: "SHA256"
      METADATA_BINDING: "true"
      BATCH_SIZE: 100
    volumes:
      - ./hashing:/app
      - bom-tiles:/data/bom:ro
      - himawari-tiles:/data/himawari:ro
      - goes-tiles:/data/goes:ro
      - meteosat-tiles:/data/meteosat:ro
      - hash-ledger:/data/ledger
      - hash-logs:/logs
    working_dir: /app
    command: python hash_pipeline.py
    networks:
      - witness-mesh
    depends_on:
      - satellite-bom
      - satellite-himawari
      - satellite-goes
      - satellite-meteosat
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/hashes.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "cryptographic"
      role: "integrity-verification"

  # ============================================================================
  # XYO BOUND-WITNESS MESH LAYER
  # ============================================================================

  witness-node-1:
    image: python:3.11-slim
    container_name: witness-node-1
    environment:
      WITNESS_ID: "WIT_001"
      WITNESS_REGION: "Sydney"
      XYO_LEDGER_MODE: "bound-witness"
    volumes:
      - ./witness:/app
      - hash-ledger:/data/ledger:ro
      - witness-1-logs:/logs
      - witness-1-state:/data/state
    working_dir: /app
    command: python witness_node.py
    networks:
      - witness-mesh
    depends_on:
      - hash-engine
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/witness.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "witness-mesh"
      role: "attestation-node"

  witness-node-2:
    image: python:3.11-slim
    container_name: witness-node-2
    environment:
      WITNESS_ID: "WIT_002"
      WITNESS_REGION: "Tokyo"
      XYO_LEDGER_MODE: "bound-witness"
    volumes:
      - ./witness:/app
      - hash-ledger:/data/ledger:ro
      - witness-2-logs:/logs
      - witness-2-state:/data/state
    working_dir: /app
    command: python witness_node.py
    networks:
      - witness-mesh
    depends_on:
      - hash-engine
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/witness.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "witness-mesh"
      role: "attestation-node"

  witness-node-3:
    image: python:3.11-slim
    container_name: witness-node-3
    environment:
      WITNESS_ID: "WIT_003"
      WITNESS_REGION: "Houston"
      XYO_LEDGER_MODE: "bound-witness"
    volumes:
      - ./witness:/app
      - hash-ledger:/data/ledger:ro
      - witness-3-logs:/logs
      - witness-3-state:/data/state
    working_dir: /app
    command: python witness_node.py
    networks:
      - witness-mesh
    depends_on:
      - hash-engine
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/witness.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      layer: "witness-mesh"
      role: "attestation-node"

  # ============================================================================
  # BYZANTINE CONSENSUS LAYER (14 ENGINES)
  # ============================================================================

  # Core Ring (3 engines)
  engine-365:
    image: python:3.11-slim
    container_name: engine-365
    environment:
      ENGINE_ID: "E01"
      ENGINE_ROLE: "CORE_IDENTITY_ANCHOR"
      BYZANTINE_QUORUM: 10
      K_VALUE_TARGET: 0.99
      CYCLE_MODE: "witness-validation"
    volumes:
      - ./engines:/app
      - hash-ledger:/data/ledger:ro
      - engine-365-state:/data/state
      - engine-365-logs:/logs
    working_dir: /app
    command: python engine_365.py
    networks:
      - consensus-ring
      - witness-mesh
    depends_on:
      - witness-node-1
      - witness-node-2
      - witness-node-3
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: '2'
    labels:
      layer: "byzantine-consensus"
      role: "core-validator"
      engine: "E01"

  engine-777:
    image: python:3.11-slim
    container_name: engine-777
    environment:
      ENGINE_ID: "E02"
      ENGINE_ROLE: "STRUCTURE_ROOT"
      BYZANTINE_QUORUM: 10
      K_VALUE_TARGET: 0.99
      CYCLE_MODE: "witness-validation"
    volumes:
      - ./engines:/app
      - hash-ledger:/data/ledger:ro
      - engine-777-state:/data/state
      - engine-777-logs:/logs
    working_dir: /app
    command: python engine_777.py
    networks:
      - consensus-ring
      - witness-mesh
    depends_on:
      - witness-node-1
      - witness-node-2
      - witness-node-3
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: '2'
    labels:
      layer: "byzantine-consensus"
      role: "core-validator"
      engine: "E02"

  engine-101:
    image: python:3.11-slim
    container_name: engine-101
    environment:
      ENGINE_ID: "E03"
      ENGINE_ROLE: "FLOW_VECTOR"
      BYZANTINE_QUORUM: 10
      K_VALUE_TARGET: 0.99
      CYCLE_MODE: "witness-validation"
    volumes:
      - ./engines:/app
      - hash-ledger:/data/ledger:ro
      - engine-101-state:/data/state
      - engine-101-logs:/logs
    working_dir: /app
    command: python engine_101.py
    networks:
      - consensus-ring
      - witness-mesh
    depends_on:
      - witness-node-1
      - witness-node-2
      - witness-node-3
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 10s
