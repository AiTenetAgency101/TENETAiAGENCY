version: '3.9'

services:
  # Three core engines (already running)
  engine-365-days:
    image: python:3.11-slim
    container_name: engine-365-days
    environment:
      ENGINE_ID: "E01"
      ENGINE_NAME: "engine-365-days"
    volumes:
      - ./engines:/app
      - engine-365-logs:/logs
    working_dir: /app
    command: python3 engine_365_days.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
    mem_limit: 512m
    cpus: '2'

  ultimate-engine:
    image: python:3.11-slim
    container_name: ultimate-engine
    environment:
      ENGINE_ID: "E02"
      ENGINE_NAME: "ultimate-engine"
    volumes:
      - ./engines:/app
      - ultimate-logs:/logs
    working_dir: /app
    command: python3 ultimate_engine.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/ultimate_sovereign_metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
    mem_limit: 1g
    cpus: '2'

  tenetaiagency-101:
    image: python:3.11-slim
    container_name: tenetaiagency-101
    environment:
      ENGINE_ID: "E03"
      ENGINE_NAME: "tenetaiagency-101"
    volumes:
      - ./engines:/app
      - tenet-logs:/logs
    working_dir: /app
    command: python3 tenetaiagency_101.py
    networks:
      - tenet-network
    healthcheck:
      test: ["CMD", "test", "-f", "/logs/metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 3
    mem_limit: 512m
    cpus: '2'

  # ============================================================================
  # PUBLIC DASHBOARD (robdoe.com)
  # ============================================================================
  public-dashboard:
    image: nginx:alpine
    container_name: public-dashboard
    ports:
      - "80:80"
    volumes:
      - ./dashboards/public/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/public.conf:/etc/nginx/nginx.conf:ro
      - ./public-certs:/etc/nginx/certs:ro
    networks:
      - tenet-network
    depends_on:
      - engine-365-days
      - ultimate-engine
      - tenetaiagency-101
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - DOMAIN=robdoe.com
    labels:
      domain: "robdoe.com"
      access: "public"
      content: "atmospheric-grid-metrics"

  # ============================================================================
  # PRIVATE ADMIN DASHBOARD (robertdoe.pw)
  # ============================================================================
  private-dashboard:
    image: nginx:alpine
    container_name: private-dashboard
    ports:
      - "443:443"
      - "8443:8443"
    volumes:
      - ./dashboards/private/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/private.conf:/etc/nginx/nginx.conf:ro
      - ./private-certs:/etc/nginx/certs:ro
    networks:
      - tenet-network
    depends_on:
      - engine-365-days
      - ultimate-engine
      - tenetaiagency-101
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - DOMAIN=robertdoe.pw
    labels:
      domain: "robertdoe.pw"
      access: "private"
      content: "ledger-forensics-admin"

  # ============================================================================
  # METRICS API SERVER (serves JSON data to dashboards)
  # ============================================================================
  metrics-api:
    image: python:3.11-slim
    container_name: metrics-api
    volumes:
      - ./metrics-api:/app
      - engine-365-logs:/logs/e01:ro
      - ultimate-logs:/logs/e02:ro
      - tenet-logs:/logs/e03:ro
    working_dir: /app
    command: python3 server.py
    networks:
      - tenet-network
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - engine-365-days
      - ultimate-engine
      - tenetaiagency-101

networks:
  tenet-network:
    driver: bridge
    name: tenet-network

volumes:
  engine-365-logs:
    driver: local
  ultimate-logs:
    driver: local
  tenet-logs:
    driver: local
