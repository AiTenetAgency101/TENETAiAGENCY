user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting for private access
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

    server {
        listen 443 ssl http2;
        server_name robertdoe.pw;
        
        # Self-signed cert (replace with real cert for production)
        ssl_certificate /etc/nginx/certs/self-signed.crt;
        ssl_certificate_key /etc/nginx/certs/self-signed.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Basic auth for private dashboard
        auth_basic "Admin Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        limit_req zone=admin burst=20 nodelay;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/admin {
            auth_basic "Admin Dashboard";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://log-collector:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }

        location /logs {
            alias /var/log/nginx;
            autoindex on;
        }
    }

    server {
        listen 80;
        server_name robertdoe.pw;
        return 301 https://$server_name$request_uri;
    }
}
